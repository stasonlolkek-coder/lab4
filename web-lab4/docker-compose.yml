version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: wp_labs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - wp_labs_postgres:/var/lib/postgresql/data
    networks:
      - wp_labs_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wp_labs_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wp_labs_network

volumes:
  wp_labs_postgres:

networks:
  wp_labs_network: